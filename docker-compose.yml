services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: korvoniumed
      POSTGRES_USER: korvoniumed
      POSTGRES_PASSWORD: ${DB_PASSWORD:-StrongPassword123!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korvoniumed"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=korvoniumed;Username=korvoniumed;Password=${DB_PASSWORD:-StrongPassword123!}"
      Jwt__Key: ${JWT_KEY:-YourSuperSecretKeyThatIsAtLeast32BytesLong!}
      Jwt__Issuer: KorvoniUmed
      Jwt__Audience: KorvoniUmedApp
      TelegramBot__Token: ${TELEGRAM_BOT_TOKEN:-}
      TelegramBot__WebhookUrl: ${TELEGRAM_WEBHOOK_URL:-}
      Cors__Origins: ${CORS_ORIGINS:-https://caravanofhope.tj}
    volumes:
      - uploads:/app/uploads
    ports:
      - "5000:5000"

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:5000}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:5000}
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - client
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt

volumes:
  pgdata:
  uploads:
  certbot-www:
  certbot-certs:
